industry: construction
saved_search: "Wave 1 — Mid-market GCs — Precon & Ops Leaders"

company_filters:
  # STRUCTURED Apollo industry (organization_industry_tag_ids) — PRECISE.
  # The loose keyword approach (q_organization_keyword_tags) returned ~4,840 but was
  # polluted with banks, staffing, and software firms whose tags merely *mention*
  # "construction" (e.g. construction-loan banks). This structured industry id is the
  # actual Apollo "Construction" classification — ~1,269 clean construction companies,
  # no banks. Tag id verified by enriching known GCs (organizations/enrich ->
  # industry_tag_id). To find ids for a new vertical, enrich a known company in it.
  industry_tag_ids: ["5567cd4773696439dd350000"]   # Apollo industry = "construction"
  employees:   {min: 100, max: 2000}        # Apollo buckets -> effectively 51-2000
  revenue_usd: {min: 50000000, max: 500000000}
  countries:   [United States]
  # Technology is a SIGNAL, not a gate: the pool is sourced WITHOUT requiring a tool
  # (Apollo's technographic coverage is sparse — only ~7% of GCs have one recorded —
  # so gating on it dropped ~92% of good-fit companies for a data-coverage reason).
  # Each sourced company is tagged with the tools it uses; that routes it into the
  # signal campaign and lets the email name the tool. Companies with none are kept.
  technology_as_signal: true
  technologies_any: [Procore, Bluebeam, Autodesk Build, e-Builder, PlanSwift, Sage Estimating]
  founded_before: 2018
  # Excluded company keywords (q_not_organization_keyword_tags).
  exclude_keywords: [residential, "single family", "home builders", remodeling]

contact_filters:
  # Broadened titles: the narrow precon/estimating-only list matched 0-3 people per
  # mid-market GC in Apollo (most don't title anyone "Chief Estimator"). These broader
  # construction-leadership terms + the seniority filter surface 6-17 real decision-
  # makers per company (COO, VP Preconstruction, CFO, VP Operations, Project Exec).
  # Apollo person_titles is a contains-match, so single words like "Operations" catch
  # "VP of Operations" etc. Company-level construction industry filter keeps them on-ICP.
  titles_any: [Preconstruction, Pre-Construction, Estimating, Estimator,
               Operations, Project Executive, Project Director, Construction Executive,
               President, Owner, Principal, General Manager,
               Chief Operating Officer, Chief Financial Officer, Vice President]
  seniority:  [Director, VP, C-Suite]
  countries:  [United States]
  email_status: [verified, likely]      # skip catch-all (high bounce risk)
  contacts_per_company: 5               # broadened targeting -> aim for max leads

signals:
  # job_postings drives the free, scrape-only job signal (signals_jobs.py):
  #   keywords_any       -> matched against the posting TITLE = "are they hiring
  #                         the roles that imply our buyer?" (role relevance).
  #   signal_phrases_any -> matched against the posting DESCRIPTION = growth/intent.
  #                         When one hits, the surrounding snippet is reused verbatim
  #                         in the email first line ("saw you're staffing up for …").
  #                         These are construction-specific on purpose — every niche
  #                         defines its own. The engine mechanism is generic.
  job_postings:
    keywords_any: [estimator, preconstruction, bid, takeoff]
    signal_phrases_any: ["breaking ground", "groundbreaking", "new project", "new development",
                         "expanding into", "expansion", "new office", "new location",
                         "new region", "new market", "new division", "growing backlog",
                         "record backlog", "recently awarded", "newly awarded", "new contract",
                         "data center", "mixed-use", "ground-up", "new facility", "scaling our"]
  news:         {lookback_days: 120, themes_any: [groundbreaking, expansion, project, award]}

hooks:
  - {id: free_implementation, angle: "Free bid-extraction pilot tied to their Procore data"}
  - {id: pain_point,          angle: "The bid-leveling backlog on precon teams"}
  - {id: roi,                 angle: "Hours saved per bid cycle"}

personalization:
  mode: first_line            # first_line (default, template+1 line) | full (generate whole body)

# Copy that wraps the personalized first line. Edit this per industry — it is the
# value-prop and CTA Brad asked us to lead with. We have no proof metric yet, so
# the email leads with the concrete mechanism + a free pilot offer instead of a
# claimed result. NEVER invent a number here: leave proof_point empty until you
# have a real, defensible figure, then fill it and it auto-appears in the body.
# No signature — the Smartlead mailbox already appends one.
messaging:
  offer: "we pull bid-leveling data straight out of Procore so your estimators stop re-keying line items by hand"
  proof_point: ""                                    # leave empty until you have a real metric
  cta: "happy to run it free on one of your recent bids so you can see the output — worth a look?"
  opt_out: "not relevant? just reply 'stop' and i'll close this out."
  # Subject A/B: variant A = company-anchored signal, variant B = this value/free-offer.
  subject_value_fallback: "free bid teardown"
  # Automated follow-ups (sequence steps 2–5). {{first_name}} / {{company_name}}
  # merge vars only — no signal dependency, so they work in either campaign.
  # delay_days are calendar days between consecutive steps; with sending.days
  # limited to Tue/Wed/Thu, the opener + 4 follow-ups land on send days across an
  # ~18-day window (cumulative offsets: 0, 4, 8, 13, 18).
  follow_ups:
    - delay_days: 4
      body: "quick follow-up — the teardown takes one of {{company_name}}'s recent bid sets and shows the bid-leveling fully extracted from Procore, no manual entry. want me to run one?"
    - delay_days: 4
      body: "circling back — most precon teams we talk to are still re-keying bid line items by hand on every job. the teardown shows what that looks like automated on one of {{company_name}}'s real bids. open to a quick look?"
    - delay_days: 5
      body: "still happy to put this in front of you, {{first_name}} — i can run the teardown on a recent bid and send back the extracted bid-leveling so you can judge it on your own data. no call needed to see the output."
    - delay_days: 5
      body: "last note from me — if speeding up bid leveling isn't a priority right now, no worries. if it is, i'll send a free teardown on a recent bid. just say the word."

sending:
  daily_quota: 500
  days: [Tue, Wed, Thu]
  window_local: "09:00-11:30"
  per_mailbox_cap: {m365: 30, gw: 25}
  tracking: on                # ON for now to gather open-rate baseline; flip to off later for M365 deliverability

reservoir:   {target_depth_days: 7}
suppression: {on_unsubscribe: true, hard_bounce_threshold: 2, suppress_company_on_meeting_months: 12}
