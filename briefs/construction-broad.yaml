industry: construction-broad
saved_search: "Volume test — broad titles, no signals"

# Same company profile as construction; companies are ingested from a validated
# CSV, so these filters aren't used for sourcing in this run.
company_filters:
  industries: [Commercial Construction, General Contractor, Building Construction]
  employees:   {min: 100, max: 2000}
  revenue_usd: {min: 50000000, max: 500000000}
  countries:   [United States]
  technologies_any: []
  exclude_keywords: [residential, "single family", "home builder", remodeling]

# ICP titles — the correct target (precon + estimating leadership + COO). We pull
# a wide net from Apollo (contacts_per_company high) and rely on icp_title_keywords
# to keep only true ICP roles: this nets MORE ICP contacts (~2.4/co) than asking
# Apollo for the tight titles directly (~0.7/co), since Apollo's title filter is
# narrow/fuzzy.
contact_filters:
  titles_any: [VP Preconstruction, Director Preconstruction, Preconstruction Manager,
               VP Estimating, Director Estimating, Chief Estimator, Chief Operating Officer]
  seniority:  [Director, VP, C-Suite]
  countries:  [United States]
  email_status: [verified, likely]
  contacts_per_company: 10
  # Local post-enrichment filter: keep a contact only if its title contains one
  # of these keywords. Maximizes ICP yield from a wide Apollo pull.
  icp_title_keywords: [preconstruction, precon, estimating, "chief estimator",
                       "chief operating", coo]

signals:
  job_postings: {keywords_any: [estimator, preconstruction, bid, takeoff]}
  news:         {lookback_days: 120, themes_any: [groundbreaking, expansion, project, award]}

hooks:
  - {id: free_implementation, angle: "Free bid-extraction pilot tied to their Procore data"}
  - {id: pain_point,          angle: "The bid-leveling backlog on precon teams — re-keying line items by hand"}
  - {id: roi,                 angle: "Hours clawed back per bid cycle"}

personalization:
  mode: full                  # full = per-contact LLM-generated subject + body (creative, varied)

messaging:
  offer: "we pull bid-leveling data straight out of Procore so your estimators stop re-keying line items by hand"
  proof_point: ""
  # The value angle the copy should orbit (your framing). Used as creative fuel,
  # not a hard claim to repeat verbatim.
  value_angle: "give precon teams roughly 4 hours back per bid cycle"
  cta: "happy to run it free on one of your recent bids so you can see the output"
  opt_out: "not relevant? just reply 'stop' and i'll close this out."
  subject_value_fallback: "want 4 hours back per bid cycle?"
  follow_ups:
    - delay_days: 3
      body: "quick follow-up — the teardown takes one of {{company_name}}'s recent bid sets and shows the bid-leveling fully extracted from Procore, no manual entry. want me to run one?"
    - delay_days: 4
      body: "last note from me — if speeding up bid leveling isn't a priority right now, no worries. if it is, i'll send a free teardown on a recent bid. just say the word."

sending:
  daily_quota: 500
  days: [Tue, Wed, Thu]
  window_local: "09:00-11:30"
  per_mailbox_cap: {m365: 30, gw: 25}
  tracking: on

reservoir:   {target_depth_days: 7}
suppression: {on_unsubscribe: true, hard_bounce_threshold: 2, suppress_company_on_meeting_months: 12}
